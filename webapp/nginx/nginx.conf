server {
    # Nginx listens on port 80 inside the container
    listen 80;
    listen 8080;

    # Set the root directory where the static files are located
    root /usr/share/nginx/html;

    # Specify the default file to serve
    index index.html index.htm;

    # Location block to handle all requests
    location / {
        # This is CRITICAL for Single Page Applications (SPAs).
        # It tries to find a matching file ($uri) or directory ($uri/).
        # If neither is found, it falls back to serving index.html,
        # allowing the client-side router to handle the route (e.g., /about).
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache control for assets for better performance
    location ~* \.(?:css|js|ico|png|jpg|jpeg|gif|svg|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}