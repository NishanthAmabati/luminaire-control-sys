name: Build Docker Images

on:
  repository_dispatch:
    types: [trigger-docker-build]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Git commit SHA to build"
        required: false
        type: string
        default: ""
      services:
        description: "Services to build"
        required: false
        type: choice
        default: "all"
        options: [all, web, gateway, python, state, scheduler, timer, metrics, luminaire]
      environment:
        description: "Target environment"
        required: false
        type: choice
        default: "dev"
        options: [dev, prod]
      registry:
        description: "Docker registry"
        required: false
        type: string
        default: ""
      username:
        description: "Registry username"
        required: false
        type: string
        default: ""

env:
  DOCKER_BAKE_FILE: docker-bake.hcl
  # Normalize inputs so they work for both CURL and UI dispatch
  SELECTED_SERVICES: ${{ github.event.inputs.services || github.event.client_payload.services || 'all' }}
  SELECTED_ENV: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'dev' }}
  SELECTED_SHA: ${{ github.event.inputs.commit_sha || github.event.client_payload.commit_sha || '' }}
  SELECTED_REGISTRY: ${{ github.event.inputs.registry || github.event.client_payload.registry || '' }}
  SELECTED_USERNAME: ${{ github.event.inputs.username || github.event.client_payload.username || '' }}

jobs:
  detect:
    name: Detect Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.detect.outputs.environment }}
      tag_suffix: ${{ steps.detect.outputs.tag_suffix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run detect-env action
        id: detect
        uses: ./.github/actions/detect-env
        with:
          environment: ${{ env.SELECTED_ENV }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SELECTED_SHA }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: |
          for service in state_service scheduler_service timer_service luminaire_service metrics_service; do
            if [ -f "$service/requirements.txt" ]; then
              echo "Testing $service..."
            fi
          done

  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      username: ${{ steps.resolve.outputs.username }}
      registry: ${{ steps.resolve.outputs.registry }}
    steps:
      - name: Resolve credentials
        id: resolve
        run: |
          USERNAME="${{ env.SELECTED_USERNAME }}"
          REGISTRY="${{ env.SELECTED_REGISTRY }}"
          if [ -z "$USERNAME" ]; then USERNAME="${{ vars.DOCKERHUB_USERNAME }}"; fi
          if [ -z "$REGISTRY" ]; then REGISTRY="docker.io"; fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ github.event.inputs.services || github.event.client_payload.services || 'all' }}
    needs: [detect, setup]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SELECTED_SHA }}

      - name: Get commit SHA
        id: commit
        run: |
          SHA=$(git rev-parse HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Resolve target name
        id: target
        run: |
          case "${{ env.SELECTED_SERVICES }}" in
            web) echo "target=webapp" ;;
            gateway) echo "target=event-gateway" ;;
            state) echo "target=state-service" ;;
            scheduler) echo "target=scheduler-service" ;;
            timer) echo "target=timer-service" ;;
            metrics) echo "target=metrics-service" ;;
            luminaire) echo "target=luminaire-service" ;;
            python) echo "target=all-python" ;;
            *) echo "target=all" ;;
          esac >> $GITHUB_OUTPUT

      - name: Setup Docker
        uses: ./.github/actions/setup-docker
        with:
          username: ${{ needs.setup.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          registry: ${{ needs.setup.outputs.registry }}

      - name: Generate bake file
        id: bake
        uses: ./.github/actions/generate-bake
        with:
          environment: ${{ needs.detect.outputs.environment }}
          services: ${{ env.SELECTED_SERVICES }}
          registry: ${{ needs.setup.outputs.registry }}
          username: ${{ needs.setup.outputs.username }}
          output: ${{ env.DOCKER_BAKE_FILE }}
        env:
          GIT_SHA: ${{ steps.commit.outputs.sha }}

      - name: Build and push
        uses: docker/bake-action@v5
        with:
          files: ${{ env.DOCKER_BAKE_FILE }}
          targets: ${{ steps.target.outputs.target }}
          push: true
          load: false

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ needs.detect.outputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | \`${{ github.event.inputs.services || 'all' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ needs.setup.outputs.registry }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Username | \`${{ needs.setup.outputs.username }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag Suffix | \`${{ needs.detect.outputs.tag_suffix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | \`${{ steps.commit.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Short SHA | \`${{ steps.commit.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images Built" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          SERVICES="${{ github.event.inputs.services || 'all' }}"
          TAG_SUFFIX="${{ needs.detect.outputs.tag_suffix }}"
          SHORT_SHA="${{ steps.commit.outputs.short_sha }}"
          case "$SERVICES" in
            all)
              echo "webapp:\${TAG_SUFFIX} \`webapp:\${SHORT_SHA}\${TAG_SUFFIX}\`"
              echo "event-gateway:\${TAG_SUFFIX} \`event-gateway:\${SHORT_SHA}\${TAG_SUFFIX}\`"
              echo "state-service:\${TAG_SUFFIX} \`state-service:\${SHORT_SHA}\${TAG_SUFFIX}\`"
              echo "scheduler-service:\${TAG_SUFFIX} \`scheduler-service:\${SHORT_SHA}\${TAG_SUFFIX}\`"
              echo "timer-service:\${TAG_SUFFIX} \`timer-service:\${SHORT_SHA}\${TAG_SUFFIX}\`"
              echo "metrics-service:\${TAG_SUFFIX} \`metrics-service:\${SHORT_SHA}\${TAG_SUFFIX}\`"
              echo "luminaire-service:\${TAG_SUFFIX} \`luminaire-service:\${SHORT_SHA}\${TAG_SUFFIX}\`"
              ;;
            web) echo "webapp:\${TAG_SUFFIX} \`webapp:\${SHORT_SHA}\${TAG_SUFFIX}\`" ;;
            gateway) echo "event-gateway:\${TAG_SUFFIX} \`event-gateway:\${SHORT_SHA}\${TAG_SUFFIX}\`" ;;
            python|state|scheduler|timer|metrics|luminaire)
              echo "${SERVICES}-service:\${TAG_SUFFIX} \`${SERVICES}-service:\${SHORT_SHA}\${TAG_SUFFIX}\`"
              ;;
            *) echo "$SERVICES:\${TAG_SUFFIX} \`$SERVICES:\${SHORT_SHA}\${TAG_SUFFIX}\`" ;;
          esac
          echo '```' >> $GITHUB_STEP_SUMMARY
