name: ci

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "git commit sha to checkout"
        required: true
        default: feature/redis-pubsub
      targets:
        description: "bake targets (comma-separated), or group name (e.g. default, python)"
        required: false
        default: default

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}

      - name: generate short SHA
        run: echo "GIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: generate build args
        run: |
          pwd
          bash generate_env.sh
          cat ../vars.json

      - name: resolve bake targets
        id: targets
        shell: bash
        run: |
          raw="${{ github.event.inputs.targets }}"
          trimmed="$(echo "${raw}" | tr -d '[:space:]')"
          if [ -z "$trimmed" ] || [ "$trimmed" = "default" ]; then
            echo "list=default" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "list=$trimmed" >> "$GITHUB_OUTPUT"

      - name: login to registry dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push image via docker bake
        uses: docker/bake-action@v5
        with:
          files: |
            docker-bake.hcl
            ../vars.json
          push: true
          targets: ${{ steps.targets.outputs.list }}
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          GIT_SHA: ${{ env.GIT_SHA }}
