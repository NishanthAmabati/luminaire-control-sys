name: Docker CI - dev

# Build and Push Docker Image

on:
  push:
    branches:
      - copilot/update-webapp-for-backend
  workflow_dispatch:

env:
  DOCKER_USERNAME: nishanthambati

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api-service
            context: ./api-service
            image: api-service
          - name: luminaire-service
            context: ./luminaire-service
            image: luminaire-service
          - name: scheduler-service
            context: ./scheduler-service
            image: scheduler-service
          - name: timer-service
            context: ./timer-service
            image: timer-service
          - name: monitoring-service
            context: ./monitoring-service
            image: monitoring-service
          - name: websocket-service
            context: ./websocket-service
            image: websocket-service
          - name: webapp
            context: ./webapp
            image: webapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/${{ matrix.service.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ matrix.service.image }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ matrix.service.image }}:buildcache,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"
