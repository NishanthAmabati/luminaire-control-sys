services:
  redis:
    image: redis:7.0
    container_name: redis
    volumes:
      - redis-data:/data
    environment:
      - TZ=Asia/Kolkata
    networks:
      - luminaire-network
    restart: unless-stopped

  luminaire-service:
    image: nishanthambati/luminaire-service:v1.0
    container_name: luminaire-service
    ports:
      - "5250:5250"
      - "5555:5555"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Kolkata
    networks:
      - luminaire-network
    restart: unless-stopped

  scheduler-service:
    image: nishanthambati/scheduler-service:v1.0
    container_name: scheduler-service
    ports:
      - "6666:6666"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./scenes:/app/scenes
    environment:
      - TZ=Asia/Kolkata
    depends_on:
      - redis
      - luminaire-service
    networks:
      - luminaire-network
    restart: unless-stopped

  monitoring-service:
    image: nishanthambati/monitoring-service:v1.0
    container_name: monitoring-service
    ports:
      - "7777:7777"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Kolkata
    networks:
      - luminaire-network
    restart: unless-stopped

  api-service:
    image: nishanthambati/api-service:v1.0
    container_name: api-service
    ports:
      - "8888:8888"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Kolkata
    depends_on:
      - redis
      - scheduler-service
      - luminaire-service
      - monitoring-service
    networks:
      - luminaire-network
    restart: unless-stopped

  websocket-service:
    image: nishanthambati/websocket-service:v1.0
    container_name: websocket-service
    ports:
      - "5001:5001"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Kolkata
    depends_on:
      - redis
      - api-service
    networks:
      - luminaire-network
    restart: unless-stopped

  webapp:
    image: nishanthambati/nginx-webapp:v1.0
    container_name: nginx-webapp
    ports:
      - "8080:80"
    depends_on:
      - websocket-service
    restart: unless-stopped

networks:
  luminaire-network:
    external: true
    #name: luminaire-network
    #driver: bridge

volumes:
  redis-data: