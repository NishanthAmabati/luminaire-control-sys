version: '3.8'

services:
  redis:
    image: redis:7.0
    container_name: redis
    volumes:
      - redis-data:/data
    environment:
      - TZ=Asia/Kolkata
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api-service:
    image: nishanthambati/api-service
    # Configurable Container Name: Defaults to api-service
    container_name: ${API_APP:-api-service}
    environment:
      - TZ=Asia/Kolkata
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    # Configurable Port: Defaults to 8000
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://api-service:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      luminaire-service:
        condition: service_healthy
      scheduler-service:
        condition: service_healthy
      timer-service:
        condition: service_healthy

  luminaire-service:
    image: nishanthambati/luminaire-service
    # Configurable Container Name: Defaults to luminaire-service
    container_name: ${LUMINAIRE_APP:-luminaire-service}
    environment:
      - TZ=Asia/Kolkata
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    # Note: Hardcoded external port 5250
    ports:
      - "5250:5250"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://luminaire-service:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 3s
    depends_on:
        redis:
          condition: service_healthy

  scheduler-service:
    image: nishanthambati/scheduler-service
    # Configurable Container Name: Defaults to scheduler-service
    container_name: ${SCHEDULER_APP:-scheduler-service}
    environment:
      - TZ=Asia/Kolkata
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./scenes:/app/scenes:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://scheduler-service:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 3s
    depends_on:
        redis:
          condition: service_healthy

  timer-service:
    image: nishanthambati/timer-service
    # Configurable Container Name: Defaults to timer-service
    container_name: ${TIMER_APP:-timer-service}
    environment:
      - TZ=Asia/Kolkata
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://timer-service:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 3s
    depends_on:
        redis:
          condition: service_healthy

  monitoring-service:
    image: nishanthambati/monitoring-service
    # Configurable Container Name: Defaults to monitoring-service
    container_name: ${MONITORING_APP:-monitoring-service}
    environment:
      - TZ=Asia/Kolkata
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://monitoring-service:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 3s
    depends_on:
        redis:
          condition: service_healthy

  websocket-service:
    image: nishanthambati/websocket-service
    # Configurable Container Name: Defaults to websocket-service
    container_name: ${WEBSOCKET_APP:-websocket-service}
    environment:
      - TZ=Asia/Kolkata
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    # Configurable Port: Defaults to 5001
    ports:
      - "${WEBSOCKET_PORT:-5001}:${WEBSOCKET_PORT:-5001}"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
        redis:
          condition: service_healthy
          
  webapp:
    image: nishanthambati/webapp
    # Configurable Container Name: Defaults to webapp
    container_name: ${WEBAPP:-webapp}
    # Configurable Port: Defaults to 80
    ports:
      - "${WEBAPP_PORT:-80}:80"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://webapp/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 3s
    depends_on:
      websocket-service:
        condition: service_started

  watchdog-service:
    image: nishanthambati/watchdog-service
    container_name: watchdog-service 
    environment:
      - TZ=Asia/Kolkata
      - PYTHONUNBUFFERED=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./watchdog-service/config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    depends_on:
      - redis
      - scheduler-service
      - luminaire-service
      - timer-service
      - monitoring-service
      - websocket-service

volumes:
    redis-data: