timezone: "Asia/Kolkata"

scales:
  cct:
    min: 3500
    max: 6500
  lux:
    min: 0
    max: 500

services:
  redis:
    redis_url: "redis://localhost:6379/0"

  tcp:
    tcpserver:
      host: "0.0.0.0"
      port: 5250
      keepalive_enabled: true
      keepalive_idle_s: 5
      keepalive_interval_s: 2
      keepalive_count: 3
      tcp_user_timeout_ms: 3000

    redis:
      pub: "devices:luminaires"

    fastAPI:
      host: "0.0.0.0"
      port: 8000
      loop: "asyncio"
      log_level: "info"
      access_log: False

  state:
    redis:
      pub: "system:events"

    cors_origins:
      - "http://localhost"
      - "http://127.0.0.1"
      - "http://localhost:8080"
      - "http://127.0.0.1:8080"

    fastAPI:
      host: "0.0.0.0"
      port: 8001
      loop: "asyncio"
      log_level: "info"
      access_log: False

  scheduler:
    scenes_dir: "/home/nishanth/dev/sss-tech/luminaire-control/scheduler_service/scenes"
    interval: 1 #seconds
    luminaire_service_url: "http://0.0.0.0:8000/devices/luminaires/set"

    redis:
      pub: "scheduler:events"

  timer:
    state_service_url: "http://0.0.0.0:8001/system/power"    
    
    redis:
      pub: "timer:events"
  
  metrics:
    interval: 1
    redis:
      pub: "metrics:events"

event_gateway:
  service:
    name: event-gateway
    port: 8088
    log_level: info
    state_service_url: http://127.0.0.1:8001/state
  redis:
    url: redis://127.0.0.1:6379/0
    reconnect_strategy_ms: 5000
  channels:
    scheduler: scheduler:events
    luminaires: devices:luminaires
    timer: timer:events
    metrics: metrics:events
    system: system:events
  sse:
    heartbeat_interval_ms: 20000
    client_write_timeout_ms: 5000
    latency_interval_ms: 2000

ui:
  cct:
    min: 3500
    max: 6500
    default: 5000
    unit: "K"
    color: "#10b981"
  intensity:
    min: 0
    max: 500
    default: 250
    unit: "lux"
    color: "#f97316"
  polling_interval_ms: 2000
  latency_interval_ms: 2000
