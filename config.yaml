# Server Configuration
server:
  host: "0.0.0.0"
  port: 5250
  websocket_host: "0.0.0.0"
  websocket_port: 5001
#  max_connections: 350

# Luminaire Operations Configuration
luminaire_operations:
  min_cct: 3500
  max_cct: 6500
  min_intensity: 0
  max_intensity: 500
  inactivity_threshold: 30
  send_timeout: 2.0
  max_retries: 3
#  max_workers: 300  # Increased for 200+ luminaires
  scene_directory: "scenes"
  total_intervals: 8640
  scheduler_update_interval: 1.0  # Seconds between scheduler updates
  log_basic_max_entries: 50
  log_advanced_max_entries: 100
  cleanup_interval: 30  # Seconds between stale device cleanups

# Logging Configuration
logging:
  level: "ERROR"
  filename_template: "%Y-%m-%d%H%M%S.log"
  rotation_when: "midnight"
  rotation_interval: 1
  rotation_backup_count: 7

# Microservices Configuration
microservices:
  device_port: 5555
  scheduler_port: 6666
  monitoring_port: 7777
  api_port: 8888
  websocket_service_port: 9999

# Redis Configuration
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null  # Set if using auth

api:
  broadcast_interval: 2

# State Management
state:
  file: "state.pkl"

# Scheduler Configuration
scheduler:
  timer_check_interval: 1